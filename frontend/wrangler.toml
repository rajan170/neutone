name = "neutone"
compatibility_date = "2024-12-01"

# Cloudflare Pages configuration
pages_build_output_dir = ".next/standalone"


# Environment variables
[vars]
NODE_ENV = "production"
SKIP_ENV_VALIDATION = "true"

# Required environment variables to set in Cloudflare dashboard:
# - DATABASE_URL
# - BETTER_AUTH_SECRET
# - AWS_ACCESS_KEY
# - AWS_SECRET_ACCESS_KEY
# - AWS_REGION
# - S3_BUCKET_NAME
# - MODAL_KEY
# - MODAL_SECRET
# - GENERATE_FROM_DESCRIPTION_ENDPOINT
# - GENERATE_FROM_DESCRIBED_LYRICS_ENDPOINT
# - GENERATE_FROM_LYRICS_ENDPOINT
# - POLAR_ACCESS_TOKEN
# - POLAR_WEBHOOK_SECRET
